{% if title %}
<div class="page-title-head d-flex align-items-center">
    <div class="flex-grow-1">
        <h4 class="fs-sm text-uppercase fw-bold m-0">{{ title }}</h4>
    </div>

    <div class="text-end">
        <ol class="breadcrumb m-0 py-0">
            <li class="breadcrumb-item"><a href="{% url 'pages:user_activity_dashboard' %}">AsterProof</a></li>
            {% if subtitle %}
            <li class="breadcrumb-item text-body-secondary">{{ subtitle }}</li>
            {% endif %}
            <li class="breadcrumb-item active">{{ title }}</li>
        </ol>
    </div>
</div>
{% endif %}
