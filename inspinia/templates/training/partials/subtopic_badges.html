{% if subtopic.is_imo_syllabus %}
<span class="badge bg-primary-subtle text-primary border border-primary-subtle" title="IMO syllabus subtopic">
  <i class="ti ti-award me-1"></i>IMO
</span>
{% endif %}
{% if subtopic.category %}
<span class="badge bg-light text-dark border">{{ subtopic.category }}</span>
{% endif %}
{% if subtopic.level %}
<span class="badge bg-warning-subtle text-warning border border-warning-subtle">{{ subtopic.get_level_display }}</span>
{% endif %}
